# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Four-phase offline+online pipeline. Phase 0: one GPT-4o-mini call decomposes
  the JD into 6 boolean signals, 21 skill weights, and a focused prose query.
  Phase 1: for all 100K candidates, extracts structured features (honeypot check,
  location, availability, career quality, skill fit) and embeds work narratives
  (career history only — no skills section) using all-MiniLM-L6-v2 into a FAISS
  IndexFlatIP. Phase 2: FAISS retrieves top 2,000 by cosine similarity; GPT-4o-mini
  extracts 6 boolean work-evidence signals per candidate (20 parallel workers);
  top 200 get recruiter-style reasoning. Phase 3 (judges run this): embed JD →
  FAISS search → score 2,000 with weighted formula → top 100 to CSV in 4 seconds.
  Honeypot multiplier (0 or 1) eliminates impossible profiles before scoring.

